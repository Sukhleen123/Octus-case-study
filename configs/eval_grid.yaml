# RAG evaluation experiment grid.
# Each named experiment defines a complete pipeline configuration.
# ~25 experiments testing each variable in isolation + best-guess combos.

experiments:
  # ── Chunker comparison (fixed: dense, e5-base-v2, top_k=10) ──────────────
  - name: chunker_heading
    chunker: heading
    retriever: dense
    embedding_model: "intfloat/e5-base-v2"
    top_k: 10
    chunk_size: 512
    chunk_overlap: 64

  - name: chunker_token
    chunker: token
    retriever: dense
    embedding_model: "intfloat/e5-base-v2"
    top_k: 10
    chunk_size: 512
    chunk_overlap: 64

  - name: chunker_sec_section
    chunker: sec_section
    retriever: dense
    embedding_model: "intfloat/e5-base-v2"
    top_k: 10
    chunk_size: 512
    chunk_overlap: 64

  - name: chunker_recursive
    chunker: recursive
    retriever: dense
    embedding_model: "intfloat/e5-base-v2"
    top_k: 10
    chunk_size: 512
    chunk_overlap: 64

  - name: chunker_hybrid
    chunker: hybrid
    retriever: dense
    embedding_model: "intfloat/e5-base-v2"
    top_k: 10
    chunk_size: 512
    chunk_overlap: 64

  # ── Retriever comparison (fixed: token, e5-base-v2, top_k=10) ────────────
  - name: retriever_dense
    chunker: token
    retriever: dense
    embedding_model: "intfloat/e5-base-v2"
    top_k: 10
    chunk_size: 512
    chunk_overlap: 64

  - name: retriever_dense_mmr
    chunker: token
    retriever: dense_mmr
    embedding_model: "intfloat/e5-base-v2"
    top_k: 10
    chunk_size: 512
    chunk_overlap: 64

  - name: retriever_bm25
    chunker: token
    retriever: bm25
    embedding_model: "intfloat/e5-base-v2"
    top_k: 10
    chunk_size: 512
    chunk_overlap: 64

  - name: retriever_hybrid
    chunker: token
    retriever: hybrid_dense_bm25
    embedding_model: "intfloat/e5-base-v2"
    top_k: 10
    chunk_size: 512
    chunk_overlap: 64

  # ── Embedding comparison (fixed: token, dense, top_k=10) ─────────────────
  - name: embed_e5_base
    chunker: token
    retriever: dense
    embedding_model: "intfloat/e5-base-v2"
    top_k: 10
    chunk_size: 512
    chunk_overlap: 64

  - name: embed_e5_large
    chunker: token
    retriever: dense
    embedding_model: "intfloat/e5-large-v2"
    top_k: 10
    chunk_size: 512
    chunk_overlap: 64

  - name: embed_bge_base
    chunker: token
    retriever: dense
    embedding_model: "BAAI/bge-base-en-v1.5"
    top_k: 10
    chunk_size: 512
    chunk_overlap: 64

  # ── top_k sensitivity (fixed: token, dense, e5-base-v2) ──────────────────
  - name: topk_5
    chunker: token
    retriever: dense
    embedding_model: "intfloat/e5-base-v2"
    top_k: 5
    chunk_size: 512
    chunk_overlap: 64

  - name: topk_10
    chunker: token
    retriever: dense
    embedding_model: "intfloat/e5-base-v2"
    top_k: 10
    chunk_size: 512
    chunk_overlap: 64

  - name: topk_15
    chunker: token
    retriever: dense
    embedding_model: "intfloat/e5-base-v2"
    top_k: 15
    chunk_size: 512
    chunk_overlap: 64

  # ── chunk_size sensitivity (token-based only) ────────────────────────────
  - name: chunk_256
    chunker: token
    retriever: dense
    embedding_model: "intfloat/e5-base-v2"
    top_k: 10
    chunk_size: 256
    chunk_overlap: 32

  - name: chunk_512
    chunker: token
    retriever: dense
    embedding_model: "intfloat/e5-base-v2"
    top_k: 10
    chunk_size: 512
    chunk_overlap: 64

  - name: chunk_1024
    chunker: token
    retriever: dense
    embedding_model: "intfloat/e5-base-v2"
    top_k: 10
    chunk_size: 1024
    chunk_overlap: 128

  # ── Best-guess optimal combos ────────────────────────────────────────────
  - name: optimal_sec_hybrid_e5large
    chunker: sec_section
    retriever: hybrid_dense_bm25
    embedding_model: "intfloat/e5-large-v2"
    top_k: 10
    chunk_size: 512
    chunk_overlap: 64

  - name: optimal_hybrid_mmr_e5large
    chunker: hybrid
    retriever: dense_mmr
    embedding_model: "intfloat/e5-large-v2"
    top_k: 10
    chunk_size: 512
    chunk_overlap: 64

  - name: optimal_recursive_hybrid_bge
    chunker: recursive
    retriever: hybrid_dense_bm25
    embedding_model: "BAAI/bge-base-en-v1.5"
    top_k: 10
    chunk_size: 512
    chunk_overlap: 64

  - name: optimal_sec_bm25_e5base
    chunker: sec_section
    retriever: bm25
    embedding_model: "intfloat/e5-base-v2"
    top_k: 10
    chunk_size: 512
    chunk_overlap: 64

  - name: optimal_hybrid_hybrid_e5base
    chunker: hybrid
    retriever: hybrid_dense_bm25
    embedding_model: "intfloat/e5-base-v2"
    top_k: 15
    chunk_size: 512
    chunk_overlap: 64

  # ── Data-driven winner: combines best from each sensitivity group ─────────
  - name: optimal_recursive_e5large_256
    chunker: recursive
    retriever: dense
    embedding_model: "intfloat/e5-large-v2"
    top_k: 5
    chunk_size: 256
    chunk_overlap: 32

  # ── Multi-vectorstore experiments ─────────────────────────────────────────
  # 3 specialized FAISS indexes: transcript_recursive + sec_recursive + sec_section
  # Routes queries to the appropriate store(s) based on doc_source + query signals.
  # Boilerplate disclaimer chunks (Cautionary Note) are de-prioritized.
  - name: multivector_base
    chunker: recursive
    retriever: dense
    embedding_model: "intfloat/e5-base-v2"
    top_k: 5
    chunk_size: 256
    chunk_overlap: 32
    multivector: true
    hyde: false

  - name: multivector_hyde
    chunker: recursive
    retriever: dense
    embedding_model: "intfloat/e5-large-v2"
    top_k: 5
    chunk_size: 256
    chunk_overlap: 32
    multivector: true
    hyde: true
