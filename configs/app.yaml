# Default application settings.
# All values here can be overridden via environment variables.

# ── Paths ─────────────────────────────────────────────────────────────────────
octus_raw_dir: "data/raw/octus"
processed_dir: "data/processed"
cache_dir: "data/cache"

# ── Storage format ────────────────────────────────────────────────────────────
# "parquet" (recommended) or "csv" (human-readable fallback)
table_format: "parquet"
duckdb_path: "data/processed/simfin/simfin.duckdb"

# ── SimFin ────────────────────────────────────────────────────────────────────
simfin_api_key: ""          # override via SIMFIN_API_KEY env var
simfin_base_url: "https://backend.simfin.com"
simfin_mode: "batch"        # "batch" | "realtime"
simfin_periodicity: "both"   # "annual" | "quarterly" | "both"

# ── Mapping ───────────────────────────────────────────────────────────────────
mapping_mode: "both"          # "auto_matched" | "confirmed" | "both"
auto_promote_matched: true    # promote auto_matched -> confirmed on first run

# ── Chunking ──────────────────────────────────────────────────────────────────
chunkers_to_build:
  - "heading"
  - "token"
chunk_size: 512
chunk_overlap: 64

# ── Retrieval ─────────────────────────────────────────────────────────────────
retriever_id: "dense"          # "dense" | "dense_mmr"
mmr_lambda: 0.5                # MMR diversity weight (0=diverse, 1=relevant)
top_k: 10

# ── Vectorstore ───────────────────────────────────────────────────────────────
vectorstore_provider: "auto"   # "auto" | "pinecone" | "faiss"
pinecone_api_key: ""           # override via PINECONE_API_KEY env var
pinecone_index_name: "llama-text-embed-v2-index"
pinecone_namespace: "default"

# ── Embeddings ────────────────────────────────────────────────────────────────
embedding_provider: "sentence_transformers"  # "mock" | "sentence_transformers" | "openai"
embedding_model: "intfloat/e5-base-v2"       # loaded locally via sentence-transformers
embedding_dim: 768             # e5-base-v2 output dimension; must match Pinecone index

# ── LLM (synthesis agent) ────────────────────────────────────────────────────
# "none" → mock template answer (no API key needed)
# "anthropic" → Claude via Anthropic API (requires ANTHROPIC_API_KEY)
llm_provider: "anthropic"
llm_model: "claude-sonnet-4-6"
anthropic_api_key: ""          # override via ANTHROPIC_API_KEY env var

# ── UI ────────────────────────────────────────────────────────────────────────
apply_mode: "auto"             # "auto" (settings changes trigger rebuild) | "manual"

# ── SEC HTML verification ─────────────────────────────────────────────────────
require_sec_html: true         # fail ingestion if any HTML file is missing
