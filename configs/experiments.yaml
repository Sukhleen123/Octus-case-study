# A/B experiment grid.
# run_experiments(settings, grid) in src/eval/run_experiments.py iterates this.

grid:
  periodicity:
    - annual
    - quarterly
  chunker:
    - heading
    - token
  retriever:
    - dense
    - dense_mmr
  simfin_mode:
    - batch
    - realtime
  mapping_mode:
    - auto_matched
    - confirmed
  vectorstore:
    - pinecone
    - faiss

# Metrics to record per experiment run
metrics:
  - retrieval_precision_at_5
  - retrieval_mrr
  - answer_faithfulness
  - latency_ms
